<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动态星空</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        #starfield {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(102, 51, 153, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 102, 204, 0.2) 0%, transparent 50%),
                linear-gradient(to bottom, #000814 0%, #001d3d 50%, #000814 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 2px rgba(255, 255, 255, 0.8);
        }

        .star.twinkle {
            animation: twinkle 3s ease-in-out infinite;
        }

        .star.float {
            animation: float 8s ease-in-out infinite;
        }

        .star.pulse {
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }

        @keyframes pulse {
            0%, 100% { 
                opacity: 0.5;
                transform: scale(1);
            }
            50% { 
                opacity: 1;
                transform: scale(1.3);
            }
        }

        .meteor {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(100, 200, 255, 0.6);
            animation: meteor-fall 1s linear;
        }

        @keyframes meteor-fall {
            0% {
                opacity: 1;
                transform: translate(0, 0);
            }
            100% {
                opacity: 0;
                transform: translate(200px, 200px);
            }
        }

        .info {
            position: fixed;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 14px;
            z-index: 100;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .info h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .info p {
            color: #aaa;
            font-size: 12px;
        }

        .controls {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(102, 126, 234, 0.3);
            color: #fff;
            font-size: 12px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .controls p {
            margin: 5px 0;
        }

        .stats {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.5);
            padding: 15px 20px;
            border-radius: 10px;
            border: 1px solid rgba(0, 200, 255, 0.3);
            color: #0cf;
            font-size: 12px;
            font-family: 'Courier New', monospace;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .stats p {
            margin: 3px 0;
        }

        @media (max-width: 768px) {
            .info {
                left: 10px;
                top: 10px;
            }

            .info h1 {
                font-size: 20px;
            }

            .controls, .stats {
                font-size: 11px;
                padding: 10px 15px;
            }
        }
    </style>
</head>
<body>
    <div id="starfield"></div>

    <div class="info">
        <h1>✨ 宇宙星空</h1>
        <p>动态星空效果演示</p>
    </div>

    <div class="stats">
        <p>⭐ 星星数量: <span id="starCount">0</span></p>
        <p>☄️ 流星数量: <span id="meteorCount">0</span></p>
        <p>📊 FPS: <span id="fps">60</span></p>
    </div>

    <div class="controls">
        <p>💡 鼠标移动查看效果</p>
        <p>🔄 刷新页面重新生成星空</p>
    </div>

    <script>
        const starfield = document.getElementById('starfield');
        const starCountEl = document.getElementById('starCount');
        const meteorCountEl = document.getElementById('meteorCount');
        const fpsEl = document.getElementById('fps');

        let starCount = 0;
        let meteorCount = 0;
        let frameCount = 0;
        let lastTime = Date.now();

        // 生成星星
        function createStars() {
            const starCount = Math.random() * 100 + 150; // 150-250 颗星

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';

                // 随机大小
                const size = Math.random() * 2 + 0.5;
                star.style.width = size + 'px';
                star.style.height = size + 'px';

                // 随机位置
                star.style.left = Math.random() * window.innerWidth + 'px';
                star.style.top = Math.random() * window.innerHeight + 'px';

                // 随机颜色（白色、蓝色、黄色）
                const colors = ['#fff', '#87ceeb', '#ffeb3b', '#ff69b4', '#00ffe0'];
                star.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];

                // 随机动画效果
                const animationType = Math.floor(Math.random() * 3);
                if (animationType === 0) {
                    star.classList.add('twinkle');
                    star.style.animationDuration = Math.random() * 2 + 2 + 's';
                    star.style.animationDelay = Math.random() * 3 + 's';
                } else if (animationType === 1) {
                    star.classList.add('float');
                    star.style.animationDuration = Math.random() * 4 + 6 + 's';
                    star.style.animationDelay = Math.random() * 2 + 's';
                } else {
                    star.classList.add('pulse');
                    star.style.animationDuration = Math.random() * 1 + 1.5 + 's';
                    star.style.animationDelay = Math.random() * 2 + 's';
                }

                starfield.appendChild(star);
            }

            starCountEl.textContent = starCount;
        }

        // 生成流星
        function createMeteor() {
            const meteor = document.createElement('div');
            meteor.className = 'meteor';

            // 随机起始位置（从上方和左方进入）
            const startX = Math.random() * window.innerWidth;
            const startY = Math.random() * window.innerHeight * 0.6;

            meteor.style.left = startX + 'px';
            meteor.style.top = startY + 'px';

            // 随机颜色变体
            const meteorColors = [
                '0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(100, 200, 255, 0.6)',
                '0 0 10px rgba(255, 255, 200, 0.8), 0 0 20px rgba(200, 180, 100, 0.6)',
                '0 0 10px rgba(100, 200, 255, 0.8), 0 0 20px rgba(100, 150, 255, 0.6)'
            ];
            meteor.style.boxShadow = meteorColors[Math.floor(Math.random() * meteorColors.length)];

            starfield.appendChild(meteor);

            // 动画完成后移除
            setTimeout(() => {
                meteor.remove();
                meteorCount--;
                meteorCountEl.textContent = meteorCount;
            }, 1000);

            meteorCount++;
            meteorCountEl.textContent = meteorCount;
        }

        // 定时创建流星
        let meteorInterval = setInterval(createMeteor, 1500);

        // 鼠标移动效果
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;

            // 根据鼠标位置随机创建流星
            if (Math.random() > 0.95) {
                const meteor = document.createElement('div');
                meteor.className = 'meteor';
                meteor.style.left = x + 'px';
                meteor.style.top = y + 'px';
                meteor.style.width = '3px';
                meteor.style.height = '3px';
                starfield.appendChild(meteor);

                setTimeout(() => {
                    meteor.remove();
                }, 1000);
            }
        });

        // 计算 FPS
        function updateFPS() {
            frameCount++;
            const currentTime = Date.now();
            const elapsed = currentTime - lastTime;

            if (elapsed >= 1000) {
                fpsEl.textContent = frameCount;
                frameCount = 0;
                lastTime = currentTime;
            }

            requestAnimationFrame(updateFPS);
        }

        // 响应式处理
        window.addEventListener('resize', () => {
            // 重新定位星星到新的窗口大小
            const stars = document.querySelectorAll('.star');
            stars.forEach(star => {
                if (parseInt(star.style.left) > window.innerWidth) {
                    star.style.left = Math.random() * window.innerWidth + 'px';
                }
                if (parseInt(star.style.top) > window.innerHeight) {
                    star.style.top = Math.random() * window.innerHeight + 'px';
                }
            });
        });

        // 初始化
        window.addEventListener('load', () => {
            createStars();
            updateFPS();
        });

        // 页面隐藏时暂停流星创建，显示时恢复
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                clearInterval(meteorInterval);
            } else {
                meteorInterval = setInterval(createMeteor, 1500);
            }
        });
    </script>
</body>
</html>
