<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>平行宇宙资料库 | 群星星际联邦终端</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 星空背景画布 -->
    <canvas id="starCanvas"></canvas>

    <!-- 银河背景 -->
    <div class="galaxy-container">
        <div class="galaxy"></div>
    </div>

    <!-- 顶部全息控制台 -->
    <header class="console-header">
        <div class="scan-line"></div>
        <h1 class="glitch-text">平行宇宙资料库 ARCHIVE-739 | STELLARIS 群星种族库</h1>
        <div class="top-buttons">
            <button id="addBtn">新建种族档案</button>
            <button id="historyBtn">浏览记录</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="输入种族/维度/特性检索...">
            <button id="searchBtn">检索</button>
        </div>
    </header>

    <!-- 维度分类侧边栏 -->
    <aside class="dimension-nav">
        <h3>文明维度分区</h3>
        <ul id="dimList"></ul>
    </aside>

    <!-- 宇宙档案展示区 -->
    <main class="archive-container" id="archiveBox"></main>

    <!-- 分页容器 -->
    <div class="page-box" id="pageBox"></div>

    <!-- 新增档案弹窗 -->
    <div class="modal" id="addModal">
        <div class="modal-content">
            <span class="close-btn closeAdd">×</span>
            <h2>录入新星际种族档案</h2>
            <div class="form-item">
                <label>维度分区</label>
                <input type="text" id="inpDim" placeholder="如：人类联邦、蜂群意识">
            </div>
            <div class="form-item">
                <label>种族名称</label>
                <input type="text" id="inpName" placeholder="文明全称">
            </div>
            <div class="form-item">
                <label>危险等级</label>
                <select id="inpDanger">
                    <option value="低">低</option>
                    <option value="中">中</option>
                    <option value="中高">中高</option>
                    <option value="高">高</option>
                    <option value="极高">极高</option>
                </select>
            </div>
            <div class="form-item">
                <label>文明等级</label>
                <input type="text" id="inpTech" placeholder="星际文明等级">
            </div>
            <div class="form-item">
                <label>种族档案描述</label>
                <textarea id="inpDesc" rows="4"></textarea>
            </div>
            <button class="submit-btn" id="submitNew">提交存档</button>
        </div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal" id="detailModal">
        <div class="modal-content">
            <span class="close-btn closeDetail">×</span>
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- 浏览记录弹窗 -->
    <div class="modal" id="historyModal">
        <div class="modal-content wide-modal">
            <span class="close-btn closeHistory">×</span>
            <h2>访问种族记录档案</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
